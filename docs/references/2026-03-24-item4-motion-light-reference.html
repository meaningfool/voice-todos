<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Voice Tasks - Motion Light</title><script src="https://cdn.tailwindcss.com"></script><script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script><style>@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Manrope:wght@400;500;600&display=swap');:root {--spring-easing: cubic-bezier(0.34, 1.56, 0.64, 1);}body {font-family: 'Manrope', sans-serif;overflow: hidden;}h1, h2, h3 {font-family: 'Archivo', sans-serif;}.spring-entry {animation: spring-in 0.6s var(--spring-easing) both;}.fade-in {animation: fade-in 0.4s ease-out both;}@keyframes spring-in {from {opacity: 0;transform: translateY(20px) scale(0.95);}to {opacity: 1;transform: translateY(0) scale(1);}}@keyframes fade-in {from {opacity: 0;}to {opacity: 1;}}@keyframes wave {0%, 100% {height: 8px;}50% {height: 24px;}}.wave-bar {width: 3px;background-color: #ef4444;border-radius: 99px;animation: wave 1s ease-in-out infinite;}.wave-bar:nth-child(2) { animation-delay: 0.1s; }.wave-bar:nth-child(3) { animation-delay: 0.2s; }.wave-bar:nth-child(4) { animation-delay: 0.3s; }.wave-bar:nth-child(5) { animation-delay: 0.15s; }.wave-bar:nth-child(6) { animation-delay: 0.25s; }.wave-bar:nth-child(7) { animation-delay: 0.05s; }.flash-orange {animation: flash-orange-anim 1s ease-out both;}@keyframes flash-orange-anim {0% { background-color: transparent; }30% { background-color: rgba(226, 109, 92, 0.15); }100% { background-color: transparent; }}</style></head><body><div class="min-h-screen bg-[#FDF8F6] flex items-center justify-center p-4 md:p-8"><div class="w-full max-w-md bg-white rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white flex flex-col h-[800px] overflow-hidden relative"><header class="pt-12 px-8 pb-6 flex items-center justify-between"><h1 class="text-2xl font-bold text-zinc-800 tracking-tight">Voice Tasks</h1><button id="nav-more-options" class="w-10 h-10 rounded-full bg-zinc-50 flex items-center justify-center hover:bg-zinc-100 transition-colors"><iconify-icon icon="lucide:more-vertical" class="text-zinc-400"></iconify-icon></button></header><div id="task-container" class="flex-1 px-8 overflow-y-auto space-y-4 pb-32"><div id="empty-state" class="flex flex-col items-center justify-center h-full text-center space-y-4"><div class="w-24 h-24 rounded-full bg-orange-50 flex items-center justify-center mb-2"><iconify-icon icon="lucide:mic" class="text-4xl text-orange-400"></iconify-icon></div><h2 class="text-xl font-bold text-zinc-800">Start speaking...</h2><p class="text-zinc-400 text-sm max-w-[200px] mx-auto">Your voice will be turned into tasks in real time.</p></div></div><div class="absolute bottom-0 left-0 right-0 bg-white border-t border-zinc-50 px-8 py-8 flex flex-col items-center"><div id="listening-ui" class="hidden flex flex-col items-center w-full mb-6 space-y-3"><div class="flex items-center gap-1 h-8"> <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div><p class="text-zinc-500 text-xs font-medium tracking-wide uppercase">Listening now...</p></div><div class="flex items-center justify-between w-full"><button id="start-btn" onclick="startSession()" class="group relative w-full py-4 bg-[#E26D5C] rounded-full text-white font-bold text-lg flex items-center justify-center gap-2 hover:bg-[#D55F4E] transition-all active:scale-95"><iconify-icon icon="lucide:mic" class="text-2xl"></iconify-icon><span>Start Session</span></button><div id="active-controls" class="hidden flex items-center justify-between w-full"><button id="finish-btn" onclick="stopSession()" class="w-full py-4 bg-[#E26D5C] rounded-full text-white font-bold text-lg hover:bg-[#D55F4E] transition-all active:scale-95 shadow-lg shadow-orange-100">Finish Session</button></div></div></div></div></div><script>let isRunning = false;const container = document.getElementById('task-container');const emptyState = document.getElementById('empty-state');const startBtn = document.getElementById('start-btn');const activeControls = document.getElementById('active-controls');const listeningUi = document.getElementById('listening-ui');const tasks = [{ text: "Draft January campaign notes", sub: "Tomorrow 10:00 AM", priority: "Urgent", color: "text-red-500", bg: "bg-red-50", assignee: "Sarah M.", category: "Marketing" },{ text: "Record demo video for team", sub: "In 5 days", priority: "High", color: "text-orange-500", bg: "bg-orange-50", assignee: "Alex Chen", category: "Product" },{ text: "Review quarterly budget", sub: "Next Monday", priority: "Normal", color: "text-zinc-400", bg: "bg-zinc-50", assignee: "Sarah M.", category: "Finance" }];function createTaskElement(task, index) {const div = document.createElement('div');div.className = 'spring-entry bg-white p-5 rounded-[24px] border border-zinc-100 shadow-sm flex gap-4 items-start group hover:border-zinc-200 transition-all cursor-pointer';div.innerHTML = `<div class="mt-1 w-6 h-6 rounded-full border-2 border-zinc-200 flex-shrink-0 group-hover:border-[#E26D5C] transition-colors"></div><div class="flex-1 space-y-2"><h3 class="text-zinc-800 font-semibold leading-snug group-hover:text-black transition-colors text-title">${task.text}</h3><div class="flex flex-wrap gap-2 items-center"><div class="flex items-center gap-1 text-zinc-400 text-xs font-medium bg-zinc-50 px-2 py-1 rounded-lg meta-due"><iconify-icon icon="lucide:calendar-days" class="text-sm"></iconify-icon><span>${task.sub}</span></div><div class="px-2 py-1 rounded-lg ${task.bg} ${task.color} text-[10px] font-bold tracking-wide uppercase meta-priority">${task.priority}</div><div class="flex items-center gap-1 text-zinc-400 text-xs font-medium bg-zinc-50 px-2 py-1 rounded-lg meta-category"><iconify-icon icon="lucide:tag" class="text-sm"></iconify-icon><span>${task.category}</span></div><div class="flex items-center gap-1.5 text-zinc-500 text-xs font-semibold bg-zinc-100/50 px-2 py-1 rounded-lg border border-zinc-100 meta-assignee"><iconify-icon icon="lucide:user" class="text-sm"></iconify-icon><span>${task.assignee}</span></div></div></div>`;return div;}function startSession() {isRunning = true;emptyState.classList.add('hidden');startBtn.classList.add('hidden');activeControls.classList.remove('hidden');listeningUi.classList.remove('hidden');container.innerHTML = '';tasks.forEach((task, i) => {setTimeout(() => {if (!isRunning) return;const el = createTaskElement(task, i);container.appendChild(el);container.scrollTop = container.scrollHeight;if (i === tasks.length - 1) {setTimeout(() => {if (!isRunning) return;const lastTask = container.lastElementChild;const h3 = lastTask.querySelector('.text-title');const category = lastTask.querySelector('.meta-category');const assignee = lastTask.querySelector('.meta-assignee');h3.classList.add('text-[#E26D5C]');h3.innerText = "Review Q1 budget with Alex";[h3, category, assignee].forEach(el => el.classList.add('flash-orange'));category.querySelector('span').innerText = "Admin";assignee.querySelector('span').innerText = "Finance Team";setTimeout(() => {h3.classList.remove('text-[#E26D5C]');[h3, category, assignee].forEach(el => el.classList.remove('flash-orange'));}, 1000);}, 2500);}}, (i + 1) * 1500);});}function stopSession() {isRunning = false;activeControls.classList.add('hidden');listeningUi.classList.add('hidden');startBtn.classList.remove('hidden');}</script></body></html>
